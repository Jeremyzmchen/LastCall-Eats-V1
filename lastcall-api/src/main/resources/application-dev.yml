spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lastcall_eats?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}

  jpa:
    show-sql: true

app:
  jwt:
    secret: your-dev-jwt-secret-key-at-least-256-bits-long-please-change
    expiration-ms: 86400000       # 24 小时
    refresh-expiration-ms: 604800000  # 7 天

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: lastcall-eats

  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: whsec_your_webhook_secret_here

  order:
    payment-timeout-minutes: 15
